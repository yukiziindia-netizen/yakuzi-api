name: Production API Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: 370586503907.dkr.ecr.ap-south-1.amazonaws.com
  ECR_BASE: yukizi-production
  K8S_NAMESPACE: yukizi

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Build, tag, and push API
        env:
          TAG: v${{ github.run_number }}-${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_BASE/backend:$TAG .
          docker push $ECR_REGISTRY/$ECR_BASE/backend:$TAG

      - name: Update Kubernetes Deployment
        env:
          TAG: v${{ github.run_number }}-${{ github.sha }}
        run: |
          kubectl set image deployment/yakuzi-api "*=$ECR_REGISTRY/$ECR_BASE/backend:$TAG" -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout status deployment/yakuzi-api -n ${{ env.K8S_NAMESPACE }}
